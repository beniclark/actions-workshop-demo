#cloud-config
# Cloud-init config for GitHub Actions self-hosted runner VM
# Installs Docker, Python 3.12, and prerequisites

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - python3-pip
  - jq
  - unzip
  - build-essential

runcmd:
  # Install Docker from official repo
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
  - systemctl enable docker
  - systemctl start docker
  # Allow the default user to run Docker without sudo
  - usermod -aG docker azureuser
  # Install Python 3.12 from deadsnakes PPA (not in Ubuntu 22.04 default repos)
  - add-apt-repository -y ppa:deadsnakes/ppa
  - apt-get update
  - apt-get install -y python3.12 python3.12-venv python3.12-dev
  - update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.12 1
  - python3 -m pip install --upgrade pip
