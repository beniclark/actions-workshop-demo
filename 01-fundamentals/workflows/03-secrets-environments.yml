# =============================================================================
# Workshop: Secrets & Environment Management
# =============================================================================
# This workflow demonstrates:
# - Secret hierarchy (org > repo > environment)
# - Secret masking and best practices
# - Environment protection rules and deployments
# - OIDC-based authentication (keyless)
# =============================================================================

name: "Secrets & Environments"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Target deployment environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
        default: dev

permissions:
  contents: read
  id-token: write

env:
  APP_ENV: ${{ vars.APP_ENV }}
  SHARED_VALUE: workflow-level

# =============================================================================
# Jobs
# =============================================================================
jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Secrets Demo
  # Shows how secrets work in GitHub Actions
  # ---------------------------------------------------------------------------
  secrets-demo:
    name: "Secrets & Variables"
    runs-on: [self-hosted, linux]

    steps:
      - name: Secrets hierarchy explanation
        run: |
          echo "=== Secret Hierarchy (highest to lowest priority) ==="
          echo "1. Environment secrets  (most specific)"
          echo "2. Repository secrets   (repo-level)"
          echo "3. Organization secrets (org-wide, shared)"
          echo ""
          echo "When names collide, the most specific level wins."
          echo "Environment secrets override repository secrets,"
          echo "which override organization secrets."

      - name: Secret masking demonstration
        run: |
          echo "=== Secret Masking ==="
          echo "GitHub automatically masks secrets in logs."
          echo "If a secret value appears in output, it shows as ***"
          echo ""
          echo "Secret value: ${{ secrets.DEMO_SECRET || '(not set)' }}"
          echo ""
          echo "Even dynamically created secrets can be masked:"
          DYNAMIC_SECRET="my-dynamic-value-$(date +%s)"
          echo "::add-mask::$DYNAMIC_SECRET"
          echo "This value is now masked: $DYNAMIC_SECRET"

      - name: Variables context demo
        run: |
          echo "=== Repository & Environment Variables ==="
          echo "APP_NAME: ${{ vars.APP_NAME || '(not set)' }}"
          echo "APP_ENV:  ${{ env.APP_ENV || '(not set)' }}"
          echo ""
          echo "Variables (vars context) are for non-sensitive config."
          echo "Secrets (secrets context) are for sensitive values."
          echo "Never store sensitive data in variables!"

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to Dev
  # No protection rules — deploys immediately
  # ---------------------------------------------------------------------------
  deploy-dev:
    name: "Deploy to Dev"
    runs-on: [self-hosted, linux]
    needs: secrets-demo
    if: ${{ inputs.target_env == 'dev' || inputs.target_env == 'staging' || inputs.target_env == 'production' }}
    environment: dev

    steps:
      - name: Deploy to dev
        run: |
          echo "Deploying to dev environment..."
          echo "Environment: dev"
          echo "No protection rules — deploys immediately."
          echo "Deploy complete."

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Staging
  # Requires approval before proceeding
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: [self-hosted, linux]
    needs: deploy-dev
    if: ${{ inputs.target_env == 'staging' || inputs.target_env == 'production' }}
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Environment: staging"
          echo "This environment requires approval before deployment."
          echo "Deploy complete."

  # ---------------------------------------------------------------------------
  # Job 4: Deploy to Production
  # Strictest protection rules
  # ---------------------------------------------------------------------------
  deploy-production:
    name: "Deploy to Production"
    runs-on: [self-hosted, linux]
    needs: deploy-staging
    if: ${{ inputs.target_env == 'production' }}
    environment: production

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Environment: production"
          echo "Deploy complete."

      - name: Protection rules summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## Environment Protection Rules

          | Environment | Required Reviewers | Wait Timer | Branch Restrictions |
          |-------------|-------------------|------------|---------------------|
          | dev | None | None | None |
          | staging | 1 required | None | main + dev/* |
          | production | 2 required | 5 min | main only |
          EOF

  # ---------------------------------------------------------------------------
  # Job 5: OIDC Demo
  # Demonstrates keyless authentication with cloud providers
  # ---------------------------------------------------------------------------
  oidc-demo:
    name: "OIDC Authentication"
    runs-on: [self-hosted, linux]
    needs: secrets-demo

    steps:
      - name: OIDC explanation
        run: |
          echo "=== OIDC (OpenID Connect) Authentication ==="
          echo ""
          echo "OIDC enables keyless authentication to cloud providers."
          echo "No static credentials needed — tokens are short-lived"
          echo "and scoped to the specific workflow run."
          echo ""
          echo "Supported providers and actions:"
          echo "  - Azure:     azure/login@v2"
          echo "  - AWS:       aws-actions/configure-aws-credentials@v4"
          echo "  - GCP:       google-github-actions/auth@v2"
          echo "  - Vault:     hashicorp/vault-action@v3"

      # Example: Azure OIDC login (commented out — requires configuration)
      # - name: Azure OIDC Login
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: OIDC comparison
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## OIDC vs Static Secrets

          | Aspect | OIDC (Recommended) | Static Secrets |
          |--------|-------------------|----------------|
          | Credential Lifetime | Short-lived (minutes) | Long-lived (manual rotation) |
          | Rotation | Automatic | Manual |
          | Scope | Per-workflow run | Broad access |
          | Secret Storage | None needed | Stored in GitHub |
          | Audit Trail | Full OIDC claims | Limited |
          | Setup Complexity | Moderate (one-time) | Simple |
          | Security Risk | Low | Higher (leak potential) |
          EOF
