# Reusable Build Workflow
# This workflow encapsulates the build process and can be called
# by other workflows. It demonstrates inputs, secrets, and outputs
# for composable CI/CD pipelines.
#
# This is a "called" workflow - it cannot run on its own.
# It must be invoked by another workflow using `uses:`.

name: "07 - Reusable Build"

on:
  workflow_call:
    inputs:
      app_name:
        description: "Application name used for tagging and identification"
        required: true
        type: string
      python_version:
        description: "Python version to use for building and testing"
        required: false
        type: string
        default: "3.12"
      working_directory:
        description: "Directory containing the application code"
        required: false
        type: string
        default: "."
      run_tests:
        description: "Whether to run the test suite"
        required: false
        type: boolean
        default: true
      dockerfile_path:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
    secrets:
      registry_url:
        description: "Container registry URL for image pushing"
        required: false
    outputs:
      image_tag:
        description: "The generated image tag"
        value: ${{ jobs.build.outputs.image_tag }}
      test_passed:
        description: "Whether tests passed"
        value: ${{ jobs.build.outputs.test_passed }}

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, linux]
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    outputs:
      image_tag: ${{ steps.metadata.outputs.image_tag }}
      test_passed: ${{ steps.tests.outputs.passed }}

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Python with the specified version
      - name: Set up Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      # Cache pip dependencies to speed up builds
      # The cache key includes the requirements file hash so it
      # invalidates when dependencies change.
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Install project dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Conditionally run the test suite
      # This step only runs if the run_tests input is true.
      # The output is captured so downstream workflows can check results.
      - name: Run tests
        id: tests
        if: inputs.run_tests
        run: |
          echo "Running test suite..."
          if pytest tests/ -v --tb=short; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
            echo "All tests passed"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
            echo "Some tests failed"
            exit 1
          fi

      # Skip tests notification
      - name: Skip tests
        if: ${{ !inputs.run_tests }}
        run: |
          echo "Tests were skipped per workflow input"

      # Generate image metadata
      # Creates a tag based on the git SHA, optionally prefixed
      # with the registry URL if one was provided.
      - name: Generate image metadata
        id: metadata
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TAG="${{ inputs.app_name }}:${SHORT_SHA}"

          if [ -n "${{ secrets.registry_url }}" ]; then
            TAG="${{ secrets.registry_url }}/${TAG}"
          fi

          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Generated image tag: ${TAG}"

      # Build the container image
      # In a real pipeline, this would also push to a registry.
      - name: Build container image
        run: |
          echo "Building container image..."
          docker build \
            -f ${{ inputs.dockerfile_path }} \
            -t ${{ steps.metadata.outputs.image_tag }} \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            .
          echo "Successfully built image: ${{ steps.metadata.outputs.image_tag }}"
